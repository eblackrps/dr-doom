name: Feature request
description: Propose a gameplay, tooling, or documentation improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Explain the gap, frustration, or opportunity.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - UI or UX
        - Audio
        - Build or CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or alternatives
      description: Share any constraints, alternatives, or concerns you already see.
