name: Bug report
description: Report a gameplay, build, deployment, or documentation problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
      placeholder: The boss gate never opened after I completed the console objective.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Share the exact sequence that reproduces the issue.
      placeholder: |
        1. Start a new run
        2. Complete the storage objective
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version, tag, or commit SHA
      placeholder: v1.5.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and OS
      placeholder: Chrome 135 on Windows 11
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - Build or CI
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, clips, or anything else helpful.
