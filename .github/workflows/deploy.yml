name: CI, Pages, and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify build and release checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: dr-doom/package-lock.json

      - name: Install dependencies
        working-directory: dr-doom
        run: npm ci

      - name: Run debug validation
        working-directory: dr-doom
        run: npm run debug

      - name: Upload production bundle
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dr-doom/dist
          if-no-files-found: error

  deploy-pages:
    name: Deploy GitHub Pages
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create tagged release
    needs: verify
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Package release artifact
        run: zip -r dr-doom-${{ github.ref_name }}.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DR DOOM ${{ github.ref_name }}
          body: |
            ## DR DOOM ${{ github.ref_name }}

            This release was built from `dr-doom/` after `npm ci` and `npm run debug` completed successfully in CI.

            - Play online: https://eblackrps.github.io/dr-doom/
            - Changelog: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md
            - Release process: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/release-process.md
          files: dr-doom-${{ github.ref_name }}.zip
          make_latest: true
